name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          allow-prereleases: true

      - name: Instalar dependências
        run: pip install -e ".[all,dev]"

      - name: Rodar testes com coverage
        run: pytest tests/ -v --tb=short --cov=qualia --cov-report=term-missing

      - name: Verificar startup da API
        run: |
          timeout 15 python -c "
          from qualia.api import app
          from qualia.core import QualiaCore
          core = QualiaCore()
          print(f'Plugins: {len(core.registry)}')
          print('API importa OK')
          " || exit 1
